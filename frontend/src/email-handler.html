<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="styles/standalone.scss" />

    <link rel="shortcut icon" href="images/fav.png" />
    <link

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"

      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    />
    <meta name="author" content="IT O'quv Markazi" />

    <meta property="og:url" content="https://typeuz.uz/" />

      content="TypeUZ — O'zbekistondagi eng zamonaviy yozuv tezligi testi platformasi. Tezlikni oshiring, natijalarni kuzating va reytingda ko'tariling."
    />
    <meta property="og:image" content="https://typeuz.uz/typeuzsocial.png" />
    <meta name="theme-color" content="#ff5a1f" id="metaThemeColor" />
    <meta name="twitter:title" content="Email Handler | TypeUZ" />
    <meta name="twitter:image" content="https://typeuz.uz/typeuzsocial.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <style>
      header {
        font-size: 2.5rem;
      }

      main {
        color: var(--text-color);
        display: grid;
        justify-content: center;
      }

      h1 {
        font-weight: unset;
        color: var(--main-color);
        font-size: 2rem;
        margin-top: 3rem;
      }

      body {
        justify-content: center;
        display: flex;
      }

      .preloader {
        text-align: center;
        display: grid;
        align-items: center;
        align-content: center;
        width: 350px;
        gap: 1rem;
      }
      .preloader .icon {
        font-size: 2rem;
        color: var(--main-color);
      }
      .preloader .subText {
        font-size: 1rem;
        color: var(--sub-color);
        font-style: italic;
      }

      .resetPassword {
        display: grid;
        width: 300px;
        gap: 1rem;
        align-items: center;
        align-content: center;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="app" class="content-grid">
      <header>
        <div id="logo">
          <div class="icon">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="1" width="38" height="38" rx="10" fill="none" stroke="#ff5a1f" stroke-width="2" opacity="0.3"/>
              <rect x="3" y="3" width="34" height="34" rx="8" fill="#ff5a1f" opacity="0.12"/>
              <text x="20" y="27" text-anchor="middle" fill="#ff5a1f" font-size="20" font-weight="900" font-family="system-ui,sans-serif">TZ</text>
            </svg>
          </div>
          <div class="text">
            <div class="top">type uz</div>
            TypeUZ
            <span style="color: var(--main-color)">Email Handler</span>
          </div>
        </div>
      </header>
      <main>
        <div class="preloader">
          <div class="icon">
            <i class="fas fa-fw fa-spin fa-circle-notch"></i>
          </div>
          <div class="text">‎</div>
          <div class="subText">‎</div>
        </div>
        <div class="resetPassword hidden">
          <input class="pwd" type="password" placeholder="New password" />
          <input
            class="pwd-confirm"
            type="password"
            placeholder="Confirm new password"
          />
          <div class="button">Change</div>
        </div>
      </main>
    </div>
  </body>
  <script type="module">
    import {
      applyActionCode,
      verifyPasswordResetCode,
      confirmPasswordReset,
      checkActionCode,
      sendPasswordResetEmail,
      signInWithEmailAndPassword,
      getAuth,
    } from "firebase/auth";
    import { initializeApp } from "firebase/app";
    import { firebaseConfig } from "./ts/constants/firebase-config";
    import { qs, onDOMReady } from "./ts/utils/dom";

    const app = initializeApp(firebaseConfig);
    const Auth = getAuth(app);

    function isPasswordStrong(password) {
      const hasCapital = !!password.match(/[A-Z]/);
      const hasNumber = !!password.match(/[\d]/);
      const hasSpecial = !!password.match(
        /[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?]/,
      );
      const isLong = password.length >= 8;
      const isShort = password.length <= 64;
      return hasCapital && hasNumber && hasSpecial && isLong && isShort;
    }

    function handleVerifyEmail(actionCode, continueUrl) {
      applyActionCode(Auth, actionCode)
        .then((resp) => {
          // Email address has been verified.

          qs("main .preloader .icon")?.setHtml(
            `<i class="fas fa-fw fa-check"></i>`,
          );
          qs("main .preloader .text")?.setText(
            `Your email address has been verified`,
          );
          qs("main .preloader .subText")?.setText(`You can now close this tab`);
        })
        .catch((error) => {
          console.error(error);
          qs("main .preloader .icon")?.setHtml(
            `<i class="fas fa-fw fa-times"></i>`,
          );
          qs("main .preloader .text")?.setText(
            `Fatal error: ${error.message}. If this issue persists, please report it.`,
          );
          // Code is invalid or expired. Ask the user to verify their email address
          // again.
        });
    }

    function showResetPassword() {
      qs("main .preloader")?.hide();
      qs("main .resetPassword")?.show();
      qs("main .resetPassword input")?.focus();
    }

    function hideResetPassword() {
      qs("main .preloader")?.show();
      qs("main .resetPassword")?.hide();
    }

    function handleResetPassword(actionCode, continueUrl) {
      // Verify the password reset code is valid.
      hideResetPassword();
      verifyPasswordResetCode(Auth, actionCode)
        .then((email) => {
          var accountEmail = email;

          var newPassword = qs("main .resetPassword .pwd")?.getValue();
          var newPasswordConfirm = qs(
            "main .resetPassword .pwd-confirm",
          )?.getValue();

          if (newPassword !== newPasswordConfirm) {
            alert("Passwords do not match");
            showResetPassword();
            return;
          }

          if (!isPasswordStrong(newPassword)) {
            alert(
              "Password must contain at least one capital letter, number, a special character and must be between 8 and 64 characters long",
            );
            showResetPassword();
            return;
          }

          // Save the new password.
          confirmPasswordReset(Auth, actionCode, newPassword)
            .then((resp) => {
              // Password reset has been confirmed and new password updated.
              qs("main .preloader .icon")?.setHtml(
                `<i class="fas fa-fw fa-check"></i>`,
              );
              qs("main .preloader .text")?.setText(
                `Your password has been changed`,
              );
              qs("main .preloader .subText")?.setText(
                `You can now close this tab`,
              );

              signInWithEmailAndPassword(Auth, accountEmail, newPassword);
            })
            .catch((error) => {
              console.error(error);
              qs("main .preloader .icon")?.setHtml(
                `<i class="fas fa-fw fa-times"></i>`,
              );
              qs("main .preloader .text")?.setText(
                `Fatal error: ${error.message}. If this issue persists, please report it.`,
              );
              // Error occurred during confirmation. The code might have expired or the
              // password is too weak.
            });
        })
        .catch((error) => {
          console.error(error);
          qs("main .preloader .icon")?.setHtml(
            `<i class="fas fa-fw fa-times"></i>`,
          );
          qs("main .preloader .text")?.setText(
            `Fatal error: ${error.message}. If this issue persists, please report it.`,
          );

          // qs("main .preloader .subText")?.setText(error);

          // Invalid or expired action code. Ask user to try to reset the password
          // again.
        });
    }

    function handleRecoverEmail(auth, actionCode, lang) {
      // Localize the UI to the selected language as determined by the lang
      // parameter.
      var restoredEmail = null;
      // Confirm the action code is valid.
      checkActionCode(Auth, actionCode)
        .then((info) => {
          // Get the restored email address.
          restoredEmail = info["data"]["email"];

          // Revert to the old email.
          return applyActionCode(Auth, actionCode);
        })
        .then(() => {
          qs("main .preloader .icon")?.setHtml(
            `<i class="fas fa-fw fa-check"></i>`,
          );
          qs("main .preloader .text")?.setText(
            `Your account email was reverted.`,
          );
          qs("main .preloader .subText")?.setText(``);

          qs("main .preloader")?.appendHtml(`
          <br>
          In case you believe your account was compromised, please request a password reset email:
          `);
          qs("main .preloader")?.appendHtml(`
          <br>
          <div class="button" onclick="sendPasswordReset('${restoredEmail}')">Send Password Reset Email</div>
          `);

          // Account email reverted to restoredEmail

          // TODO: Display a confirmation message to the user.

          // You might also want to give the user the option to reset their password
          // in case the account was compromised:
        })
        .catch((error) => {
          console.error(error);
          qs("main .preloader .icon")?.setHtml(
            `<i class="fas fa-fw fa-times"></i>`,
          );
          qs("main .preloader .text")?.setText(error.message);
        });
    }

    function sendPasswordReset(email) {
      sendPasswordResetEmail(Auth, email)
        .then(() => {
          qs("main .preloader .icon")?.setHtml(
            `<i class="fas fa-fw fa-check"></i>`,
          );
          qs("main .preloader .text")?.setText(`Password reset email sent`);
          qs("main .preloader .subText")?.setText(`Please check your inbox`);
        })
        .catch((error) => {
          console.error(error);
          qs("main .preloader .icon")?.setHtml(
            `<i class="fas fa-fw fa-times"></i>`,
          );
          qs("main .preloader .text")?.setText(error.message);
        });
    }

    function getParameterByName(name, url = window.location.href) {
      name = name.replace(/[\[\]]/g, "\\$&");
      var regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)"),
        results = regex.exec(url);
      if (!results) return null;
      if (!results[2]) return "";
      return decodeURIComponent(results[2].replace(/\+/g, " "));
    }

    onDOMReady(() => {
      try {
        // Get the action to complete.
        var mode = getParameterByName("mode");
        // Get the one-time code from the query parameter.
        var actionCode = getParameterByName("oobCode");
        // (Optional) Get the continue URL from the query parameter if available.
        var continueUrl = getParameterByName("continueUrl");
        // (Optional) Get the language code if available.
        var lang = getParameterByName("lang") || "en";

        // Configure the Firebase SDK.
        // // This is the minimum configuration required for the API to be used.
        // var config = {
        //   'apiKey': "YOU_API_KEY" // Copy this key from the web initialization
        //                           // snippet found in the Firebase console.
        // };
        // var app = firebase.initializeApp(config);
        // var auth = firebase.auth();

        if (!mode) {
          qs("main .preloader .icon")?.setHtml(
            `<i class="fas fa-fw fa-times"></i>`,
          );
          qs("main .preloader .text")?.setText(`Mode parameter not found`);
          return;
        }

        if (!actionCode) {
          qs("main .preloader .icon")?.setHtml(
            `<i class="fas fa-fw fa-times"></i>`,
          );
          qs("main .preloader .text")?.setText(
            `Action code parameter not found`,
          );
          return;
        }

        // Handle the user management action.
        switch (mode) {
          case "resetPassword":
            // Display reset password handler and UI.
            qs("#logo .text span")?.setText("Reset Password");
            document.title = "Reset Password | TypeUZ";
            showResetPassword();
            break;
          case "recoverEmail":
            // Display email recovery handler and UI.
            handleRecoverEmail(actionCode);
            break;
          case "verifyEmail":
            qs("#logo .text span")?.setText("Verify Email");
            document.title = "Verify Email | TypeUZ";
            // Display email verification handler and UI.
            handleVerifyEmail(actionCode, continueUrl);
            break;
          default:
            qs("main .preloader .icon")?.setHtml(
              `<i class="fas fa-fw fa-times"></i>`,
            );
            qs("main .preloader .text")?.setText(`Invalid mode`);
            console.error("no mode found");
          // Error: invalid mode.
        }

        qs("main .resetPassword .button")?.on("click", () => {
          handleResetPassword(actionCode, continueUrl);
        });

        qs("main .resetPassword input")?.on("keypress", (e) => {
          if (e.key === "Enter") handleResetPassword(actionCode, continueUrl);
        });
      } catch (e) {
        qs("main .preloader .icon")?.setHtml(
          `<i class="fas fa-fw fa-times"></i>`,
        );
        qs("main .preloader .text")?.setText(
          `Fatal error: ${e.message}. If this issue persists, please report it.`,
        );
      }
    });

    qs("header")?.on("click", () => {
      window.location = "/";
    });
  </script>
</html>
