<!doctype html>
<html lang="uz">
  <load src="html/head.html" />

  <body class="loading">
    <mount data-component="overlays"></mount>
    <load src="html/warnings.html" />
    <div class="customBackground"></div>

    <!-- theme component adds to the head element, don't move to head.html -->
    <mount data-component="theme"></mount>
    <div id="barTimerProgress" class="timerMain">
      <div class="opacityWrapper" style="opacity: 0">
        <div class="bar"></div>
      </div>
    </div>
    <mount data-component="modals" id="solidmodals"></mount>
    <mount data-component="popups" id="solidpopups"></mount>
    <div id="popups">
      <load src="html/popups.html" />
    </div>
    <div id="app" class="content-grid focus hidden">
      <mount data-component="header"></mount>
      <main class="full-width content-grid" style="height: 100%">
        <load src="html/pages/loading.html" />

        <div class="page pageLanding hidden" id="pageLanding">
          <mount data-component="landingpage"></mount>
        </div>

        <div class="page pageAbout hidden full-width" id="pageAbout">
          <mount data-component="aboutpage"></mount>
        </div>

        <div class="page pageAccount hidden" id="pageAccount">
          <mount data-component="accountpage"></mount>
        </div>
        <div class="page pageAdminLogin hidden" id="pageAdminLogin">
          <mount data-component="adminloginpage"></mount>
        </div>
        <div class="page pageAdminDashboard hidden" id="pageAdminDashboard">
          <mount data-component="admindashboardpage"></mount>
        </div>
        <div class="page pageAdminUsers hidden" id="pageAdminUsers">
          <mount data-component="adminuserspage"></mount>
        </div>
        <div class="page pageAdminContent hidden" id="pageAdminContent">
          <mount data-component="admincontentpage"></mount>
        </div>
        <div class="page pageAdminAnalytics hidden" id="pageAdminAnalytics">
          <mount data-component="adminanalyticspage"></mount>
        </div>
        <div class="page pageAdminAi hidden" id="pageAdminAi">
          <mount data-component="adminalipage"></mount>
        </div>
        <div
          class="page pageAdminNotifications hidden"
          id="pageAdminNotifications"
        >
          <mount data-component="adminnotificationspage"></mount>
        </div>
        <div class="page pageAdminAds hidden" id="pageAdminAds">
          <mount data-component="adminadspage"></mount>
        </div>
        <div class="page pageAdminSettings hidden" id="pageAdminSettings">
          <mount data-component="adminsettingspage"></mount>
        </div>
        <div class="page pageLogin hidden" id="pageLogin">
          <mount data-component="loginpage"></mount>
        </div>
        <div class="page pageOnboarding hidden" id="pageOnboarding">
          <mount data-component="onboardingpage"></mount>
        </div>
        <div class="page pageProfile hidden" id="pageProfile">
          <mount data-component="profilepage"></mount>
        </div>
        <div class="page pageProfileSearch hidden" id="pageProfileSearch"></div>
        <div class="page pageFriends hidden" id="pageFriends"></div>
        <div
          class="page pageAccountSettings hidden"
          id="pageAccountSettings"
        ></div>

        <load src="html/pages/test.html" />

        <div class="page page404 hidden" id="page404">
          <mount data-component="notfoundpage"></mount>
        </div>

        <div class="page pagePrivacy hidden" id="pagePrivacy">
          <mount data-component="privacypolicypage"></mount>
        </div>
        <div class="page pageTerms hidden" id="pageTerms">
          <mount data-component="termsofservicepage"></mount>
        </div>
        <div class="page pageSecurity hidden" id="pageSecurity">
          <mount data-component="securitypolicypage"></mount>
        </div>
        <div class="page pageLeaderboards hidden" id="pageLeaderboards">
          <mount data-component="leaderboardpage"></mount>
        </div>
      </main>
      <mount data-component="footer"></mount>
    </div>
    <link rel="stylesheet" href="" id="globalFunBoxTheme" type="text/css" />
    <script type="module" src="ts/index.ts"></script>
  </body>
</html>
