<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="backend-url" content="" />
  <title>typeuz.uz — Kirish</title>
  <style>
    body {
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      margin: 0;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333;
      border-top-color: #FF5A1F;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <script>
    (function() {
      // Parse query params (GitHub callback) and hash fragment (Google OAuth)
      var params = new URLSearchParams(window.location.search);

      // If search is empty, try hash fragment (Google OAuth implicit flow)
      if (!params.toString()) {
        var hash = window.location.hash.replace(/^#/, '');
        if (hash) {
          params = new URLSearchParams(hash);
        }
      }

      var token = params.get('auth_token') || params.get('id_token');
      var uid = params.get('auth_uid');
      var email = params.get('auth_email');
      var name = params.get('auth_name');
      var error = params.get('auth_error');
      var state = params.get('state');

      // Google OAuth: need to exchange id_token via backend
      if (token && !uid && !error) {
        // Derive backend URL from query param, meta tag, or fallback
        var backendUrl = params.get('backend_url') || '';
        if (!backendUrl) {
          try {
            var meta = document.querySelector('meta[name="backend-url"]');
            if (meta) backendUrl = meta.getAttribute('content') || '';
          } catch (e) {}
        }
        if (!backendUrl) {
          // Last resort fallback for same-origin dev setup
          backendUrl = window.location.protocol + '//' + window.location.hostname + ':5005';
        }
        fetch(backendUrl + '/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken: token, email: params.get('email') || '' })
        })
        .then(function(r) { return r.json(); })
        .then(function(json) {
          if (json.data && json.data.token) {
            localStorage.setItem('typeuz_token', json.data.token);
            localStorage.setItem('typeuz_user', JSON.stringify({
              uid: json.data.uid,
              email: json.data.email || '',
              name: json.data.name || ''
            }));
            if (window.opener) {
              window.opener.postMessage({
                type: 'typeuz_oauth', success: true,
                token: json.data.token, uid: json.data.uid,
                email: json.data.email || '', name: json.data.name || ''
              }, '*');
              window.close();
            } else {
              window.location.href = '/';
            }
          } else {
            if (window.opener) {
              window.opener.postMessage({
                type: 'typeuz_oauth', success: false,
                error: json.message || 'Google login failed'
              }, '*');
              window.close();
            }
          }
        })
        .catch(function() {
          if (window.opener) {
            window.opener.postMessage({
              type: 'typeuz_oauth', success: false, error: 'Backend error'
            }, '*');
            window.close();
          }
        });
        return;
      }

      if (error) {
        window.opener && window.opener.postMessage({
          type: 'typeuz_oauth',
          success: false,
          error: decodeURIComponent(error)
        }, '*');
        window.close();
        return;
      }

      if (token && uid && email) {
        try {
          localStorage.setItem('typeuz_token', token);
          localStorage.setItem('typeuz_user', JSON.stringify({
            uid: uid,
            email: decodeURIComponent(email || ''),
            name: decodeURIComponent(name || '')
          }));
        } catch(e) {}

        if (window.opener) {
          window.opener.postMessage({
            type: 'typeuz_oauth',
            success: true,
            token: token,
            uid: uid,
            email: decodeURIComponent(email || ''),
            name: decodeURIComponent(name || '')
          }, '*');
          window.close();
        } else {
          window.location.href = '/';
        }
      } else {
        if (window.opener) {
          window.opener.postMessage({
            type: 'typeuz_oauth',
            success: false,
            error: 'Missing auth data'
          }, '*');
          window.close();
        } else {
          window.location.href = '/';
        }
      }
    })();
  </script>
</body>
</html>
